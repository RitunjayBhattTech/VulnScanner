services:
  postgres:
    image: postgres:15
    env_file:
      - backend/.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scanner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scanner}
      POSTGRES_DB: ${POSTGRES_DB:-scanner}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scanner}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  migrations:
    build:
      context: backend
      dockerfile: Dockerfile
    command: alembic upgrade head
    volumes:
      - ./backend:/usr/src/app
    env_file:
      - backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/usr/src/app
    ports:
      - 8000:8000
    env_file:
      - backend/.env
    environment:
      SERVICE_TYPE: api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    cap_add:
      - NET_RAW
      - NET_ADMIN
    restart: unless-stopped

  worker:
    build:
      context: backend
      dockerfile: Dockerfile
    command: celery -A app.core.celery_app worker --loglevel=info -Q scans
    volumes:
      - ./backend:/usr/src/app
    env_file:
      - backend/.env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - 5173:80
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  ollama_data:
